version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: clarity-postgres
    environment:
      POSTGRES_DB: clarity_dev
      POSTGRES_USER: clarity
      POSTGRES_PASSWORD: clarity_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: clarity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
